services:
  brain-python:
    environment:
      BRAIN_MODULE_SERVICES: ${BRAIN_MODULE_SERVICES:-bilibili=http://module-bilibili:8011,tsperson=http://module-tsperson:8012}
      BRAIN_MODULE_TIMEOUT: ${BRAIN_MODULE_TIMEOUT:-5}
    depends_on:
      module-bilibili:
        condition: service_started
      module-tsperson:
        condition: service_started

  module-bilibili:
    build:
      context: ${BILIBILI_MODULE_CONTEXT:-../testbot-module-bilibili}
    env_file:
      - path: ./config/modules/bilibili.env
        required: false
    ports:
      - "${BILIBILI_MODULE_PORT:-8011}:8011"
    command:
      [
        "uvicorn",
        "bilibili_module.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8011",
      ]

  module-tsperson:
    build:
      context: ${TSPERSON_MODULE_CONTEXT:-../testbot-module-tsperson}
    env_file:
      - path: ./config/modules/tsperson.env
        required: false
    ports:
      - "${TSPERSON_MODULE_PORT:-8012}:8012"
    command:
      [
        "uvicorn",
        "tsperson_service.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8012",
      ]
