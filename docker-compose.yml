x-build-proxy-args: &build-proxy-args
  HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
  HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
  NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-localhost,127.0.0.1,::1,postgres,brain-python,gateway-go,testbot-media}
  http_proxy: ${DOCKER_BUILD_HTTP_PROXY:-}
  https_proxy: ${DOCKER_BUILD_HTTPS_PROXY:-}
  no_proxy: ${DOCKER_BUILD_NO_PROXY:-localhost,127.0.0.1,::1,postgres,brain-python,gateway-go,testbot-media}

x-brain-env: &brain-env
  APP_ENV: ${APP_ENV:-local}
  DATABASE_URL: ${DATABASE_URL:-postgres://testbot:change-me-local-only@postgres:5432/testbot?sslmode=disable}
  OUTBOX_TOKEN: ${OUTBOX_TOKEN:?set OUTBOX_TOKEN in .env}

x-gateway-env: &gateway-env
  APP_ENV: ${APP_ENV:-local}
  BRAIN_BASE_URL: ${BRAIN_BASE_URL:-http://brain-python:8000}
  PYTHON_BRAIN_URL: ${PYTHON_BRAIN_URL:-http://brain-python:8000}
  OUTBOX_TOKEN: ${OUTBOX_TOKEN:?set OUTBOX_TOKEN in .env}
  GATEWAY_LISTEN_ADDR: ${GATEWAY_LISTEN_ADDR:-:808}
  GATEWAY_WS_PATH: ${GATEWAY_WS_PATH:-/ws}
  GATEWAY_BRAIN_TIMEOUT_SECONDS: ${GATEWAY_BRAIN_TIMEOUT_SECONDS:-20}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testbot}
      POSTGRES_USER: ${POSTGRES_USER:-testbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    profiles:
      - tools
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testbot}
      POSTGRES_USER: ${POSTGRES_USER:-testbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - ./database/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f /migrations/000001_enable_pgvector.up.sql
        psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f /migrations/000002_core_chat_tables.up.sql
        psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f /migrations/000003_message_outbox.up.sql
        psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f /migrations/000004_memory.up.sql
        psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f /migrations/000005_memory_lifecycle.up.sql
        psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f /migrations/000006_memory_embedding_recall.up.sql
        psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f /migrations/000007_conversation_state.up.sql

  brain-python:
    profiles:
      - docker-app
    image: ${BRAIN_IMAGE:-testbot-brain-python:latest}
    build:
      context: ./brain-python
      network: ${DOCKER_BUILD_NETWORK:-default}
      args:
        <<: *build-proxy-args
    env_file:
      - path: ./brain-python/.env
        required: false
    environment:
      <<: *brain-env
    ports:
      - "${BRAIN_PORT:-8000}:8000"
    volumes:
      - ./brain-python:/app
      - ./database:/database:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--no-access-log",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  gateway-go:
    profiles:
      - docker-app
    image: ${GATEWAY_IMAGE:-testbot-gateway-go:latest}
    build:
      context: ./gateway-go
      target: dev
      network: ${DOCKER_BUILD_NETWORK:-default}
      args:
        <<: *build-proxy-args
    environment:
      <<: *gateway-env
    ports:
      - "${GATEWAY_PORT:-808}:808"
    volumes:
      - ./gateway-go:/src
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["go", "run", "."]
    depends_on:
      brain-python:
        condition: service_healthy

  napcat:
    image: ${NAPCAT_IMAGE:-mlikiowa/napcat-docker:latest}
    profiles:
      - napcat
    restart: unless-stopped
    ports:
      - "${NAPCAT_WEBUI_BIND_HOST:-127.0.0.1}:${NAPCAT_WEBUI_PORT:-6099}:6099"
      - "${NAPCAT_HTTP_BIND_HOST:-127.0.0.1}:${NAPCAT_HTTP_PORT:-3000}:3000"
      - "${NAPCAT_WS_BIND_HOST:-127.0.0.1}:${NAPCAT_WS_PORT:-3001}:3001"
    environment:
      NAPCAT_UID: ${NAPCAT_UID:-1000}
      NAPCAT_GID: ${NAPCAT_GID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${NAPCAT_DATA_DIR:-./napcat}/qq_data:/app/.config/QQ
      - ${NAPCAT_DATA_DIR:-./napcat}/config:/app/napcat/config
      - ${NAPCAT_DATA_DIR:-./napcat}/plugins:/app/napcat/plugins
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  postgres-data:
  go-mod-cache:
  go-build-cache:
