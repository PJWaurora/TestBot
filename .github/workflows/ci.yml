name: CI

on:
  push:
  pull_request:

jobs:
  go-test:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gateway-go/go.mod
          check-latest: true
          cache-dependency-path: gateway-go/go.sum

      - name: Run Go tests
        working-directory: gateway-go
        run: go test ./...

  python-test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: brain-python/requirements.txt

      - name: Install Python dependencies
        working-directory: brain-python
        run: python -m pip install -r requirements.txt

      - name: Run Python tests
        working-directory: brain-python
        run: python -m pytest

  compose-check:
    name: Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate compose config
        env:
          POSTGRES_PASSWORD: ci-only-password
          DATABASE_URL: postgres://testbot:ci-only-password@postgres:5432/testbot?sslmode=disable
          NAPCAT_IMAGE: mlikiowa/napcat-docker:latest
        run: docker compose config
